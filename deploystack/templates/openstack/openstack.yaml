passwords:
  ADMIN_PASSWORD: ""
  SERVICE_PASSWORD: ""
  RABBITMQ_PASSWORD: ""
  DATABASE_PASSWORD: ""
  DEMO_PASSWORD: ""

network:
  HOST_IP: ""
  HOST_IP_NETMASK: ""
  HOST_IP_CIDR: ""
  HOST_IP_GATEWAY: ""
  HOST_DNS_SERVERS: 
  HOST_MGMT_INTERFACE: ""

neutron:
  DRIVER: "ovs"           # ovs | ovn
  
  public_network:
    PUBLIC_SUBNET_CIDR: ""
    PUBLIC_SUBNET_RANGE_START: ""
    PUBLIC_SUBNET_RANGE_END: ""
    PUBLIC_SUBNET_GATEWAY: ""
    PUBLIC_SUBNET_DNS_SERVERS: ""

  # OVS-specific
  ovs:
    CREATE_BRIDGES: "yes"
    PUBLIC_BRIDGE_INTERFACE: ""
    PUBLIC_BRIDGE: "br-ex"
    TUNNEL_BRIDGE: "br-tun" # only for VXLAN networks tenant
    TENANT_BRIDGE: "br-tenant"  # only OVS, OVN manages it alone

  # OVN-specific
  ovn:
    CREATE_BRIDGES: "yes"

    OVN_NB_PORT: "6641"
    OVN_SB_PORT: "6642"

    OVN_PUBLIC_BRIDGE_INTERFACE: "" 
    OVN_PUBLIC_BRIDGE: "br-ex"

    OVN_ENCAP_TYPE: "geneve"        # geneve | vxlan

    OVN_L3_SCHEDULER: "leastloaded" # leastloaded | chance

    ENABLE_DISTRIBUTED_FLOATING_IP: "no"

  # Tenant network configuration (common to OVS and OVN)
  tenant_network:
    TYPE: "geneve"      # OVN: geneve, vxlan | OVS: flat, vlan, vxlan
    VNI_RANGE: "1:65536"

  # Configure provider networks
  provider_networks:
    - name: "public"
      bridge: "br-ex"
      type: "flat"
    # Add more if you have multiple physnets:
    # - name: "internal"
    # bridge: "br-internal"
    # type: "flat"

  default_security_group:
    defaults:
      remote_ip_prefix: "0.0.0.0/0"

    services:
      ssh:
        enabled: true
        port: 22
        protocol: tcp

      icmp:
        protocol: icmp
        enabled: true

      http:
        enabled: false
        port: 80
        protocol: tcp

      https:
        enabled: false
        port: 443
        protocol: tcp

    #rules:
    #  - direction: ingress
    #    protocol: tcp
    #    port_range: [8080, 8080]
    #    remote_ip_prefix: "0.0.0.0/0"

manila:
  BACKEND: "generic"     # generic | cephfs | cephfsnfs | netapp | dell_emc | ...

  BACKEND_NAME: "generic"

  SERVICE_NETWORK_NAME: "manila-service-network"

  SHARE_PROTOCOLS:
    - NFS

  generic:
    SERVICE_INSTANCE_FLAVOR: "manila-service"
    SERVICE_IMAGE_NAME: "manila-service-image"

    DRIVER_HANDLES_SHARE_SERVERS: "yes"

    INTERFACE_DRIVER: "manila.network.linux.interface.OVSInterfaceDriver"

    CONNECT_SHARE_SERVER_TO_TENANT_NETWORK: "yes"

  cephfs: {}

  cephfsnfs: {}

  netapp: {}

  dell_emc: {}

cinder:
  lvm:
    # --- Backend ---

    # Name of the LVM volume group to use for Cinder volumes
    VOLUME_GROUP: "cinder-volumes"

    # --- Physical volume ---

    # Path to a real block device to use as LVM backend
    # If set, the loopback settings below are ignored
    # Example: "/dev/sdb"
    PHYSICAL_VOLUME: ""

    # --- Loopback device (used only if PHYSICAL_VOLUME is not set) ---

    # Loopback device path
    CINDER_VOLUME_LVM_PHYSICAL_PV_LOOP_PATH: "/dev/loop0"

    # Path of the loopback image file on disk
    CINDER_VOLUME_LVM_IMAGE_FILE_PATH: "/var/lib/cinder/cinder-volumes.img"

    # Size of the loopback image in GB
    CINDER_VOLUME_LVM_IMAGE_SIZE_IN_GB: "5"

  # IP address of the iSCSI target (defaults to network.HOST_IP if left empty)
  TARGET_IP_ADDRESS: "{network.HOST_IP}"

  # Volume clearing strategy when a volume is deleted
  # Options: zero (overwrite with zeros), shred (secure erase), none (skip, faster for testing)
  VOLUME_CLEAR: "zero"

  # Amount of data to clear in MB (0 = entire volume)
  VOLUME_CLEAR_SIZE: 1


compute:
  NOVA_COMPUTE_VIRT_TYPE: "kvm"   # kvm | qemu (qemu for VM nested)
  CPU_ALLOCATION_RATIO: 4.0
  RAM_ALLOCATION_RATIO: 1.5
  DISK_ALLOCATION_RATIO: 1.5

optional_services:
  INSTALL_CINDER: "no"
  INSTALL_MANILA: "no"
  INSTALL_HORIZON: "yes"

  # ( Coming Soon to be Implemented )
  #INSTALL_HEAT: no
  #INSTALL_OCTAVIA: no   # Load Balancer
  #INSTALL_BARBICAN: no  # Key Manager

openstack:
  OPENSTACK_RELEASE: "caracal"
  REGION_NAME: "RegionOne"